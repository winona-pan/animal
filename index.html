<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ===== 題庫資料 =====
const MC_QUESTIONS = [
  // Set 1: Ch 1, 2, 4, 5
  { id: 1, set: "Ch 1, 2, 4, 5", q: "Hawk Goose effect (鷹鵝效應)在探討?", choices: ["捕食者之間的競爭","動物辨認捕食者的能力","被捕食者之間的互助","以上皆非"], ans: 1, explain: "鷹鵝效應是經典實驗：將老鷹形狀的剪影從天空飛過時，幼鵝會驚慌逃跑；但相同剪影反方向飛（變成鵝的形狀）時，幼鵝沒反應。這證明動物能**天生辨識捕食者的形狀**，不需要學習。" },
  { id: 2, set: "Ch 1, 2, 4, 5", q: "Innate behavior 不會由下列何者造成", choices: ["天擇","性擇","人擇","學習"], ans: 3, explain: "**先天行為（innate）的定義就是「不需要學習」**，由基因決定。天擇、性擇、人擇都是塑造基因組成的演化力量，所以都能造成先天行為。學習是後天的，因此不屬於先天行為的成因。" },
  { id: 3, set: "Ch 1, 2, 4, 5", q: "下列何者不符合 natural/sexual selection 條件?", choices: ["性狀在族群內皆一致","性狀影響個體生存","性狀影響個體繁衍","性狀可遺傳"], ans: 0, explain: "天擇/性擇要發生，必須有三個條件：①**變異**（族群內有差異）②影響生存或繁殖 ③可遺傳。如果性狀「皆一致」就沒有變異可供選擇，演化無從發生。" },
  { id: 4, set: "Ch 1, 2, 4, 5", q: "果蠅的生理週期何者正確?", choices: ["果蠅無明顯生理週期，早晚活動量一致","果蠅生理週期只由一個基因所控制","果蠅生理週期不受基因控制，無法遺傳","果蠅生理週期有長有短，每一隻都不太一樣"], ans: 3, explain: "果蠅生理週期由**多個基因**（period、timeless、clock等）共同控制，可以遺傳，且**個體間有自然變異**（有的接近24小時、有的略長或略短）。Konopka & Benzer 的經典研究就是利用這種變異找到 period 基因的。" },
  { id: 5, set: "Ch 1, 2, 4, 5", q: "甚麼樣的情況下適合學習新的行為而不是仰賴遺傳天行為", choices: ["個體一生或是跨世代的環境變化小","個體一生的環境變化小，但跨世代的環境變化大","個體一生的環境變化大，但跨世代的環境變化小","個體一生或是跨世代的環境變化大"], ans: 2, explain: "**學習適用的情境**：環境在個體生命中會變化（需要彈性應對），但跨世代規則大致穩定（學習能力本身可被天擇保留）。若跨世代變化也很大，連學習機制都無法穩定演化。若一生環境都不變，就用先天行為最省成本。" },
  { id: 6, set: "Ch 1, 2, 4, 5", q: "作實驗得到證據符合下列何者實驗方法?", choices: ["觀察研究 (Empirical research)","理論性研究 (Theoretical research)","概念性研究 (Conceptual research)","以上皆是"], ans: 0, explain: "**Empirical（實證/觀察研究）**指透過實驗或觀察取得實際資料的研究方法。理論性研究偏向用數學模型推導；概念性研究是整合既有概念提出新想法。" },
  { id: 7, set: "Ch 1, 2, 4, 5", q: "整合舊有想法並產生新的觀念符合下列何者實驗方法?", choices: ["觀察研究 (Empirical research)","理論性研究 (Theoretical research)","概念性研究 (Conceptual research)","以上皆非"], ans: 2, explain: "**概念性研究（Conceptual）**整合既有的想法、概念或理論，從中提出新的觀念或框架，不一定產生新的實驗資料。" },
  { id: 8, set: "Ch 1, 2, 4, 5", q: "Tinbergen 的機制(Mechanism)問題在探討行為的?", choices: ["神經或賀爾蒙的影響","發育如何改變行為","行為如何影響個體生存與繁殖","行為演化的來源路徑"], ans: 0, explain: "Tinbergen 的 4 個問題：**①機制（Mechanism）—神經/荷爾蒙怎麼運作** ②發育（Development）③功能（Function）—生存繁殖 ④演化（Evolution）。機制與發育屬於 proximate（近因）；功能與演化屬於 ultimate（終極因）。" },
  { id: 9, set: "Ch 1, 2, 4, 5", q: "Tinbergen 的 ultimate question 包括?", choices: ["行為神經機制","行為對物種繁衍的功用","行為發育的過程","賀爾蒙對行為的影響"], ans: 1, explain: "**Ultimate（終極因）= 功能 + 演化**：為什麼這個行為存在？對生存繁殖有什麼好處？選項B「繁衍的功用」就是功能性問題。其他選項都是 proximate（近因）。" },
  { id: 10, set: "Ch 1, 2, 4, 5", q: "下列何領域跟動物行為無關", choices: ["遺傳","神經","生態","以上皆有關"], ans: 3, explain: "動物行為學是**跨領域學科**：遺傳（行為如何遺傳）、神經（行為的神經基礎）、生態（行為與環境的關係）全都密切相關。" },

  // Set 2: Ch 1, 3, 11
  { id: 11, set: "Ch 1, 3, 11", q: "切葉蟻把葉子切下來?", choices: ["當食物吃","蓋房子","養真菌","趕走捕食者"], ans: 2, explain: "切葉蟻是著名的「**農夫螞蟻**」：牠們把葉子切下、咀嚼後用來培養特定真菌，再以真菌為食。是動物界的「農業」經典案例（共生關係）。" },
  { id: 12, set: "Ch 1, 3, 11", q: "利用模型預測動物覓食行為符合下列何者實驗方法?", choices: ["觀察研究 (Empirical research)","理論性研究 (Theoretical research)","概念性研究 (Conceptual research)","以上皆非"], ans: 1, explain: "**理論性研究（Theoretical）**：用數學或計算模型來預測，例如「最適攝食理論」就是用方程式預測動物該選哪種獵物。" },
  { id: 13, set: "Ch 1, 3, 11", q: "建立最適攝食理論(optimal foraging theory)模型時，動物捕食獵物可能必須考量", choices: ["獵物所產生的能量","捕捉獵物消耗的能量","其他獵物出現的頻率","以上皆是"], ans: 3, explain: "最適攝食理論的核心是**淨能量收益最大化**：能量收益 ÷（搜尋時間 + 處理時間）。所以要考量獵物的能量、捕捉成本、以及其他選擇出現的機率（機會成本）。" },
  { id: 14, set: "Ch 1, 3, 11", q: "風險敏感理論(Risk-sensitive foraging)說明", choices: ["個體在飢餓時會選擇風險較高之食物","個體在飢餓時會選擇風險較低之食物","個體選擇食物風險高低與本身飢餓程度無關","以上皆非"], ans: 0, explain: "**風險敏感覓食**：當動物吃飽時偏好「穩定報酬」（風險迴避）；當瀕臨飢餓時偏好「賭一把」（風險追求），因為安穩低報酬會餓死，搏一下還有機會。" },
  { id: 15, set: "Ch 1, 3, 11", q: "免疫螢光染色(immunostaining)神經活性的標記(like c-fos)可以讓我們", choices: ["得知有神經反應的神經細胞","控制神經細胞反應","修復神經細胞","區分不同種類的神經細胞"], ans: 0, explain: "**c-fos** 是「立即早期基因」，當神經元被活化時會大量表現，因此染色後**可標記出哪些細胞最近被活化過**。它是觀察工具，不能控制或修復細胞。" },
  { id: 16, set: "Ch 1, 3, 11", q: "光遺傳學可利用雷射光", choices: ["修復神經細胞組織","控制神經細胞反應","移動神經細胞位置","連接神經細胞"], ans: 1, explain: "**光遺傳學（Optogenetics）**：在神經元上表現對光敏感的離子通道（如 channelrhodopsin），照藍光就能開啟、引發神經放電；可以**精準時間控制神經活性**。" },
  { id: 17, set: "Ch 1, 3, 11", q: "動物的覓食行為受到甚麼影響?", choices: ["天生基因遺傳","個體探索創新","社交互動學習","以上皆是"], ans: 3, explain: "覓食行為是**先天 + 後天**的綜合產物：基因設定基本偏好（如鳥類的喙形決定吃什麼）、個體會自行探索新食物（innovation）、也會觀察同伴學習（social learning，如英國山雀偷牛奶瓶的故事）。" },
  { id: 18, set: "Ch 1, 3, 11", q: "有關 foraging 基因下列何者正確", choices: ["影響果蠅幼蟲的活動力","跟壓力反應有關","為一蛋白質激酶(Protein Kinase)","外勤蜂(Forager)比育幼蜂(Nurse)有較低的表現量"], ans: 2, explain: "**foraging（for）基因編碼 PKG（cGMP-dependent protein kinase）**，是一個蛋白質激酶。它最早在果蠅幼蟲發現有 rover（高活動）與 sitter（低活動）兩型；在蜜蜂中，**外勤蜂的 for 表現量比育幼蜂「高」**（D選項說反了）。\n\n*註：選項A、B 也是 foraging 基因的正確描述，但若只能選一個，C 最具體。*" },
  { id: 19, set: "Ch 1, 3, 11", q: "鳥類在儲存食物的能力上", choices: ["各族群的能力非常類似","記憶力有助於食物儲存","不受天擇的影響","不具有這種能力"], ans: 1, explain: "**記憶力是食物儲存的關鍵**：例如美國的星鴉（Clark's nutcracker）會藏上萬顆松子，幾個月後還能找回大部分。其海馬迴特別發達，記憶力受天擇強化。" },
  { id: 20, set: "Ch 1, 3, 11", q: "下列何者不屬於鳥類覓食的創新例子", choices: ["在挖土機旁邊找食物","吃媽媽給的食物","嘗試新的食物","以上皆是"], ans: 1, explain: "**「創新」（innovation）= 找出新的覓食方式**。挖土機旁找食物（適應人類活動）、嘗試新食物都是創新；但「吃媽媽給的食物」是被動接受，不是探索行為。" },

  // Set 3: Ch 2, 12
  { id: 21, set: "Ch 2, 12", q: "松鼠把蛇皮咬碎是為了?", choices: ["築巢","補充養分","吸引異性","混淆捕食者"], ans: 3, explain: "**松鼠會撿蛇蛻下來的皮、咀嚼後塗在自己身上**——這是著名的「氣味偽裝」行為：用蛇的味道讓自己對響尾蛇等捕食者「隱形」，是非常聰明的反捕食策略。" },
  { id: 22, set: "Ch 2, 12", q: "破壞小鼠嗅覺器官通常會導致", choices: ["小鼠增加靠近捕食者的可能性","小鼠減少靠近捕食者的可能性","不影響小鼠跟捕食者之間的關係","以上皆有可能"], ans: 0, explain: "**小鼠主要靠嗅覺偵測捕食者**（如貓的氣味、TMT 等費洛蒙）。失去嗅覺後，小鼠無法警覺，反而更容易靠近危險源。" },
  { id: 23, set: "Ch 2, 12", q: "為何田鼠(Field mice)的毛色會跟環境一致", choices: ["田鼠可以生理上改變自己的體色","跟環境不同顏色的田鼠都被淘汰","田鼠可以學習如何改變體色","以上皆非"], ans: 1, explain: "**這是天擇的經典例子**：佛羅里達沙灘上的田鼠毛色淺、內陸森林的田鼠毛色深。顏色不匹配的個體容易被獵食、留不下後代，所以族群整體越來越像環境（不是個體自己變色）。" },
  { id: 24, set: "Ch 2, 12", q: "下列何者不是偽裝的例子", choices: ["竹節蟲假扮成樹枝","變色龍在一片綠葉中變成綠色","蟾蜍魚躲在洞穴中","蘭花螳螂模擬成花的樣子"], ans: 2, explain: "**偽裝（camouflage）的核心是「看起來像背景或其他物體」**。躲在洞穴是「藏匿」（hiding），不是讓自己融入背景的偽裝策略。" },
  { id: 25, set: "Ch 2, 12", q: "花枝可以改變自己的體色融入下列哪種背景當中?", choices: ["相同一致背景 (Uniform)","斑駁或斑點狀背景 (Mottled)","破壞不規則的背景 (Disruptive)","以上皆是"], ans: 3, explain: "**花枝（cuttlefish）是偽裝大師**：牠們的皮膚有色素細胞（chromatophore），可在 0.5 秒內變色，並能呈現三種偽裝模式對應不同背景。" },
  { id: 26, set: "Ch 2, 12", q: "面對捕食者，動物可能會作出何種反應?", choices: ["靠近","逃走","攻擊捕食者","以上皆是"], ans: 3, explain: "**反捕食策略有多種**：① 接近觀察（mobbing，群鳥圍攻貓頭鷹）② 逃走 ③ 反擊（如獵豹幼崽被攻擊時母獵豹會反擊）。視情境決定。" },
  { id: 27, set: "Ch 2, 12", q: "珊瑚蛇鮮豔的斑紋是為了?", choices: ["求偶","吸引獵物","警告捕食者","保護色"], ans: 2, explain: "**警告色（aposematism）**：珊瑚蛇的紅黃黑斑紋告訴捕食者「我有毒，別吃我」。這也讓無毒的王蛇演化出模仿配色（Batesian mimicry）。" },
  { id: 28, set: "Ch 2, 12", q: "面對危及食，動物產生戰鬥或逃跑反應(Fight-or-Flight response)會導致", choices: ["心跳加速","促進消化","瞳孔縮小","以上皆是"], ans: 0, explain: "**Fight-or-flight = 交感神經啟動**：心跳加速（送血到肌肉）、瞳孔放大（不是縮小）、**抑制消化**（不是促進）、呼吸加快。腎上腺素是主要傳遞者。" },
  { id: 29, set: "Ch 2, 12", q: "下列何種情況可能會減少動物逃離捕食者的可能性", choices: ["飢餓","距離藏身處距離遠","所處的群體數量小","捕食者距離近"], ans: 0, explain: "**飢餓會降低逃跑意願**——因為動物必須繼續覓食才能活下去，會願意承擔更高風險。其他選項（離藏身處遠、群體小、捕食者近）都會**增加**逃跑機率。" },
  { id: 30, set: "Ch 2, 12", q: "上層捕食者在生態保育所扮演的角色為?", choices: ["數目越多代表生物多樣性越高","適當的數目能維持生態平衡","數目越少才能確保被捕食者的繁衍","跟生態保育無關"], ans: 1, explain: "**上層捕食者是關鍵物種（keystone species）**：例如黃石公園野放灰狼後，鹿群減少、植被恢復、河流地形都改變了（「營養瀑布」trophic cascade）。適當數量維繫生態平衡，過多過少都不行。" },

  // Set 4: Ch 4, 5, 6
  { id: 31, set: "Ch 4, 5, 6", q: "敏化作用(sensitization)使個體對相同單一刺激", choices: ["反應減少","反應增加","產生新的反應","沒有影響"], ans: 1, explain: "**敏化（sensitization）vs 習慣化（habituation）**：\n• 敏化 → 反應**增強**（如海蛞蝓被電一下後，連輕輕摸都會強烈縮鰓）\n• 習慣化 → 反應減弱（如不斷觸碰沒事，動物就不縮鰓了）" },
  { id: 32, set: "Ch 4, 5, 6", q: "順向失憶 (Anterograde amnesia)使個體", choices: ["忘記過去發的事情","無法產生新的記憶","無法記得任何事情","記憶逐漸失去"], ans: 1, explain: "**順向失憶（anterograde）= 無法形成「新」記憶**（如電影《Memento》男主角）。\n**逆向失憶（retrograde）= 忘記過去**（撞到頭後不記得車禍前發生的事）。" },
  { id: 33, set: "Ch 4, 5, 6", q: "果蠅的 T 型迷宮(T-maze)方法主要是測試果蠅的", choices: ["適應作用 (Habituation)","敏化作用 (Sensitization)","制約學習 (Classical conditioning)","操作制約 (Operant conditionaing)"], ans: 2, explain: "**果蠅 T-maze**：把一條腿的氣味與電擊配對訓練，然後放進 T 型迷宮讓果蠅選邊。學會避開「電擊氣味」就證明牠把氣味（CS）與電擊（US）連結了——這就是**古典制約**。" },
  { id: 34, set: "Ch 4, 5, 6", q: "老鼠的條件制約恐懼(fear conditioning)實驗中，記憶力較好的老鼠在聽到聲音刺激時", choices: ["尋找聲音來源","較為害怕而顫抖","沒有感覺","開始進食"], ans: 1, explain: "**恐懼制約 fear conditioning**：聲音（CS）配對電擊（US）後，老鼠學會聽到聲音 = 危險。記憶好的老鼠更會表現**僵住（freezing）/顫抖**——這是齧齒類典型的恐懼反應。" },
  { id: 35, set: "Ch 4, 5, 6", q: "實驗顯示大量表現 CREB gene 可以", choices: ["增加果蠅及老鼠記憶","增加果蠅記憶但降低老鼠記憶","增加果蠅記憶但降低老鼠記憶","降低果蠅及老鼠記憶"], ans: 0, explain: "**CREB（cAMP response element-binding protein）是記憶固化的關鍵轉錄因子**。Tim Tully 等人的研究：過量表現 CREB 在果蠅和老鼠身上**都能增強長期記憶**形成（一次訓練就學會本來要多次訓練的內容）。" },
  { id: 36, set: "Ch 4, 5, 6", q: "記憶形成的過程", choices: ["感官記憶>工作記憶>長期記憶","感官記憶獨立形成工作記憶與長期記憶","感官記憶>長期記憶>工作記憶","各種記憶為獨立形成並無順序關係"], ans: 0, explain: "**多階段記憶模型**：\n① **感官記憶**（毫秒級）→ 大部分被過濾掉\n② **工作/短期記憶**（秒～分鐘）→ 注意力決定保留什麼\n③ **長期記憶**（小時～終生）→ 透過 consolidation 固化" },
  { id: 37, set: "Ch 4, 5, 6", q: "下列何者為社會學習", choices: ["老鼠在恐懼箱中發現聲音跟電擊相關","看 Youtube 自學滑板","狗發現鈴鐺聲代表有食物","喝了過期牛奶拉肚子，下次不敢再試了"], ans: 1, explain: "**社會學習 = 透過觀察他人來學習**。看 YouTube 模仿是典型例子。其他三個都是「個人經驗學習」（古典/操作制約）。" },
  { id: 38, set: "Ch 4, 5, 6", q: "科學家認為鳥類的聲樂學習(vocal learning)類似人類的", choices: ["音樂欣賞","樂器使用","語言學習","技術學習"], ans: 2, explain: "**鳴禽（鳥類）學唱歌與人類學語言有驚人相似**：\n• 都有「敏感期」（critical period）\n• 都需要聽榜樣（tutor）\n• 大腦都有專責區（鳥類 HVC ↔ 人類 Broca's area）\n• 都會經歷「牙牙學語」階段（subsong）" },
  { id: 39, set: "Ch 4, 5, 6", q: "有關教導(Teaching)下列何者正確", choices: ["相較於個體學習學習者將花較多時間取得利益","指導者應預期立即得到回報","只有人類可以主動指導，一般動物只能透過機會教育","一定要有指導者與學習者"], ans: 3, explain: "**Caro & Hauser (1992) 對「教導」的定義有三條件**：\n① 教導者修改自身行為（且付出成本）\n② 學習者學得**更快**（不是更慢）\n③ **必須有教者和學者雙方**\n動物界確有主動教學的例子：狐獴媽媽教幼崽處理活蠍子。" },
  { id: 40, set: "Ch 4, 5, 6", q: "在復育計畫上我們要如何減少釋放的復育的對象被捕食者獵食", choices: ["減少捕食者","釋放前先教導復育對象辨識捕食者","無法，只能順其自然","透過基因工程使復育個體可以抵抗捕食者"], ans: 1, explain: "**復育前的「捕食者識別訓練」**已成標準做法：先讓動物看到捕食者模型 + 不愉快經驗（如噴水、警報聲），建立恐懼制約，再野放，存活率明顯提升。" },

  // Set 5: Ch 7, 8
  { id: 41, set: "Ch 7, 8", q: "公果蠅在無法分辨對象性別時往往會", choices: ["展開求偶不放棄任何交配的機會","減少求偶以免浪費能量","攻擊對方以自保","以上皆非"], ans: 0, explain: "**對公果蠅而言「錯過交配機會」的代價>「白追一場」的代價**，所以演化偏好「先追再說」的策略：求偶不分對象（甚至會追公的），確認後再決定。" },
  { id: 42, set: "Ch 7, 8", q: "結紮影響公鼠交配的主要荷爾蒙為", choices: ["膽固醇","睪固酮","雌酮","腎上腺素"], ans: 1, explain: "**結紮 = 切除睪丸 → 睪固酮（testosterone）大幅下降**。睪固酮是雄性交配行為的關鍵荷爾蒙，下降後性慾、交配行為都會減少。" },
  { id: 43, set: "Ch 7, 8", q: "下列有關性擇敘述何者正確?", choices: ["一定是雌性動物作選擇","跟天擇作用剛好相反","導致同性間的競爭(intrasexual competition)","不需要透過基因遺傳"], ans: 2, explain: "**性擇有兩種形式**：\n• **同性間競爭（intrasexual）**——通常是公的打架搶母\n• **異性間選擇（intersexual）**——通常是母的挑公\n性擇不一定是雌選雄（如海龍是公選母）；也是演化的一種，必須能遺傳。" },
  { id: 44, set: "Ch 7, 8", q: "下列何者為造成性擇的主要原因", choices: ["公母生理結構的差異","公母數量上的差異","公母對子代投資的差異","公母生活環境的差異"], ans: 2, explain: "**Trivers 的親代投資理論（parental investment）**：哪一方投資多（通常是母的：懷孕、哺乳、護幼），哪一方就成為「稀有資源」，另一方（投資少的）就要競爭。投資差異 → 性擇方向決定。" },
  { id: 45, set: "Ch 7, 8", q: "下列何者動物在交配上主要是雄性選擇雌性?", choices: ["紅毛猩猩","粗皮漬螈","海龍","孔雀"], ans: 2, explain: "**海龍/海馬科**是「性別角色翻轉」的經典案例：**公的負責懷孕**（卵在公的育兒袋中），所以公的是稀有資源，反而由公的挑剔母的（要顏色鮮豔、身材好的母海龍）。" },
  { id: 46, set: "Ch 7, 8", q: "在以雌性選擇雄性交配的物種中，雌性動物後代數目主要取決於", choices: ["交配的次數","資源的充足","雄性的數目","雄性的大小"], ans: 1, explain: "**雌性是「投資多」的一方，繁殖瓶頸是資源**（懷孕需要養分、哺乳需要能量）。她不需要多次交配，一次就能生一窩。所以子代數量受**食物/資源充足度**限制，而不是交配次數。" },
  { id: 47, set: "Ch 7, 8", q: "公蠍蛉提供食物來吸引雌性符合下列哪一種雌性選擇的模型", choices: ["直接利益(Direct benefits)","誠實訊號 (Indicator traits)","感官偏好 (Sensory bias)","費雪模型 (Fisherian runaway)"], ans: 0, explain: "**直接利益（Direct benefits）**：母方因接受交配「直接」得到實質好處。公蠍蛉送食物（婚禮禮物 nuptial gift）就是母方的營養補給，是物質上的直接利益。" },
  { id: 48, set: "Ch 7, 8", q: "健康的公孔雀有較燦爛的羽毛符合下列哪一種雌性選擇的模型", choices: ["直接利益(Direct benefits)","誠實訊號 (Indicator traits)","感官偏好 (Sensory bias)","費雪模型 (Fisherian runaway)"], ans: 1, explain: "**誠實訊號 / 好基因模型（Indicator / Handicap principle）**：只有真的健康、抗病的公孔雀才養得起那麼浮誇的羽毛，所以羽毛越燦爛 = 基因越好（誠實的廣告）。" },
  { id: 49, set: "Ch 7, 8", q: "在費雪模型中雌性的偏好會跟雄性的表形成正相關因為?", choices: ["雌性偏好跟雄性表形使用相同基因","雌性偏好會決定交配對象因此影響子代表型","雌性會淘汰表型不符合偏好的子代","雌性在行為上可以主動改變子代表型"], ans: 1, explain: "**Fisherian runaway 失控選擇**：母選有 X 特徵的公 → 生下的小公會有 X 特徵+小母會有「偏好 X」的基因 → 兩種基因連鎖、互相加強，導致 X 越演越誇張（如孔雀尾巴）。母的「選擇」就是讓兩基因相關的引擎。" },
  { id: 50, set: "Ch 7, 8", q: "人類的活動對動物們的影響包括", choices: ["開闢道路增加獨居動物交流機會","溫室效應減少北極熊跟棕熊雜交機會","環境污染降低鳥類繁殖意願","以上皆是"], ans: 2, explain: "選項A錯：道路**切割棲地**而不是促進交流。\n選項B錯：暖化**增加**北極熊棕熊接觸（已出現雜交種 grolar bear）。\n選項C對：研究顯示噪音、光害、塑膠微粒等污染**確實影響鳥類繁殖**（鳴唱頻率改變、激素失調等）。" },

  // Set 6: Ch 6, 7, 15
  { id: 51, set: "Ch 6, 7, 15", q: "同性競爭主要是由甚麼導致", choices: ["天擇","人擇","性擇","親擇"], ans: 2, explain: "**同性競爭（intrasexual competition）= 性擇的一種形式**：同性別個體爭奪交配機會。如公鹿打架、公雞競鳴，都是性擇造成的選擇壓力。" },
  { id: 52, set: "Ch 6, 7, 15", q: "下列何者不屬於雄性競爭", choices: ["打架","精子競爭","殺嬰行為","以上皆屬於雄性競爭"], ans: 3, explain: "**雄性競爭可發生在不同階段**：\n• 交配前：打架、爭地盤\n• 交配中：精子競爭（多公精液在母體內競爭）\n• 交配後：殺嬰（殺其他公的後代讓母重新發情）\n三者都屬於雄性競爭。" },
  { id: 53, set: "Ch 6, 7, 15", q: "雄性競爭主要是", choices: ["競爭誰的力氣大","競爭誰的後代數多","競爭誰活得久","競爭誰的體積大"], ans: 1, explain: "**演化只在乎一件事：留下多少基因 = 後代數**。所有的「力氣、體型、武器」都只是手段，最終目標是繁殖成功。" },
  { id: 54, set: "Ch 6, 7, 15", q: "有關打鬥下列何者正確", choices: ["打鬥是最省能量的競爭方法","打鬥前可能會先利用不同特徵來判斷打鬥的必要性","階級能力差別越大越可能產生鬥爭","以上皆是"], ans: 1, explain: "**打鬥成本高、有受傷風險**，所以動物會先「**評估**」（assessment）：比體型、看角的大小、聽吼聲，雙方差距明顯時弱者直接讓步。**差距越大反而越不打**。" },
  { id: 55, set: "Ch 6, 7, 15", q: "有關精子競爭下列何者影響後代的數目", choices: ["精子數目","精子速度","精子形狀","以上皆是"], ans: 3, explain: "**精子競爭**就像一場「賽跑」：數量多（淹沒對手）、速度快（先到卵）、形狀好（游得直、附著力強）都會影響哪隻精子成功授精。雄性會根據競爭強度調整精子量（如老鼠在察覺其他公鼠氣味時射出更多精子）。" },
  { id: 56, set: "Ch 6, 7, 15", q: "殺嬰行為的目的不包括?", choices: ["進食","與雌性交配","增價自己的後代","減少其他雄性動物的後代"], ans: 0, explain: "**殺嬰（infanticide）的核心目的是「重置母方繁殖週期」**——殺掉前任公的後代，母方會停止哺乳並重新發情，新公就能交配生下自己的後代。**不是為了吃**。經典例子：獅子、葉猴、灰狼。" },
  { id: 57, set: "Ch 6, 7, 15", q: "社會階級的定義", choices: ["階級高的可以取得較多資源","階級低者要服侍階級高的個體","階級高的要欺負階級低的","以上皆是"], ans: 0, explain: "**社會階級（dominance hierarchy）**的核心是「**優先取得資源**」（食物、配偶、地盤）。階級低者「迴避」而不是「服侍」；階級高者也不必欺負——通常只要展示就夠了。" },
  { id: 58, set: "Ch 6, 7, 15", q: "有關社會階級", choices: ["雄性雌性動物皆有社會階級","階級一旦形成永不改變","人類的階級跟其他動物的階級是完全不同的社會結構","以上皆是"], ans: 0, explain: "**公母都有階級**（如母獅有階級、母雞有「啄序」pecking order）。階級會隨年齡、健康、聯盟改變。人類階級在生理機制上跟其他靈長類相似（壓力荷爾蒙、催產素等）。" },
  { id: 59, set: "Ch 6, 7, 15", q: "階級較高的小鼠會表現出?", choices: ["減少攻擊性行為 (aggression)","較強噴尿標記行為 (scent marking)","在鑽管測試(tube test)中主動退後","以上皆是"], ans: 1, explain: "**高階雄鼠的標誌**：\n• 大量**噴尿標記**地盤（費洛蒙廣告）\n• 攻擊性**強**（不是減少）\n• Tube test（鑽管測試）中**推前對手**而不是退後\nMUP（major urinary protein）含量也較高。" },
  { id: 60, set: "Ch 6, 7, 15", q: "在大象破壞農作物的議題上，政府應該致力於", choices: ["遷移所有大象至保護區","了解行為來誘導大象避開農作物","減少農民耕作的範圍","以上皆是"], ans: 1, explain: "**「了解行為來解決衝突」**才是長久之道：例如用蜜蜂聲音嚇阻大象（大象怕蜂群）、用辣椒籬笆、利用大象不喜歡的氣味。強行遷移或減少耕作都不實際。" },

  // Set 7: Ch 9, 10
  { id: 61, set: "Ch 9, 10", q: "哪一動物沒有育幼行為", choices: ["昆蟲綱","爬蟲類","鳥類","以上皆有"], ans: 3, explain: "**育幼行為廣泛存在**：\n• 昆蟲：蜜蜂、螞蟻、白蟻（社會性昆蟲）有極致的育幼\n• 爬蟲類：鱷魚會護卵和帶幼鱷\n• 鳥類：幾乎所有鳥都有親代撫育" },
  { id: 62, set: "Ch 9, 10", q: "下列哪種賀爾蒙最有可能增加母鼠育幼行為?", choices: ["睪固酮","腎上腺素","催產素","胰島素"], ans: 2, explain: "**催產素（Oxytocin）**是育幼/親密行為的關鍵荷爾蒙：誘發分娩、刺激泌乳、增加母方對幼崽的關心。注射催產素可讓未懷孕的母鼠也表現出育幼行為。" },
  { id: 63, set: "Ch 9, 10", q: "動物可以利用下列何者來辨識自己的子代?", choices: ["長相","味道","巢穴位置","以上皆是"], ans: 3, explain: "**親代辨識後代的線索**：\n• **長相**（綿羊認識自己的羊羔臉部）\n• **氣味**（多數哺乳類）\n• **聲音**（企鵝在繁殖群中靠叫聲找）\n• **位置**（鳥類認巢，不認蛋）" },

---

**(A) 親擇（Kin selection）解釋**

**Hamilton's rule: rB > C**
- r = 親緣關係（共享基因比例）
- B = 受惠者的好處（避免餓死的價值）
- C = 自己的成本（吐出血量的代價）

**機制細節**：
- 吸血蝙蝠群中有很多近親（母女、姊妹）→ r 高
- 救親屬就是「間接讓自己的基因傳下去」（inclusive fitness）
- 「分血基因」透過幫助親屬而擴散

**演化定錨**：
帶有「分血基因」的個體，雖然自己分出去成本 C，但**親屬獲得的 rB > C**，所以這個基因在族群中比例會增加，最終固定下來。

---

**(B) 群擇（Group selection）解釋**

**核心想法**：選擇可以同時發生在「個體」與「群體」兩個層次。

**機制細節**：
- 有「分血傳統」的蝙蝠**群體** vs 沒有的群體
- 有分血的群體死亡率較低 → 群體**整體繁榮**
- 沒有的群體更容易整群餓死或人口減少
- 整個有分血的群體被「選擇」下來

**經典爭議**：
- 群擇較具爭議（個體自私者可能在群體內勝過利他者）
- 但 **Multilevel selection theory（D.S. Wilson）**：當群體內競爭較弱、群體間競爭強時，群擇可成立

// ===== Components =====
function Header({ view, setView }) {
  return (
    <header className="border-b border-sepia/20 bg-cream/60 backdrop-blur sticky top-0 z-10">
      <div className="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3">
        <div>
          <div className="text-xs tracking-[0.3em] text-sepia uppercase mb-1">A Naturalist's Notebook</div>
          <h1 className="font-display text-3xl sm:text-4xl font-medium text-forest leading-tight">
            動物行為學 <span className="text-rust italic">複習</span>
          </h1>
        </div>
        <nav className="flex gap-1 text-sm">
          <button onClick={() => setView('home')} className={`px-3 py-1.5 rounded-full transition-all ${view === 'home' ? 'bg-forest text-cream' : 'hover:bg-parchment text-sepia'}`}>首頁</button>
          <button onClick={() => setView('quiz')} className={`px-3 py-1.5 rounded-full transition-all ${view === 'quiz' ? 'bg-forest text-cream' : 'hover:bg-parchment text-sepia'}`}>練習</button>
          <button onClick={() => setView('study')} className={`px-3 py-1.5 rounded-full transition-all ${view === 'study' ? 'bg-forest text-cream' : 'hover:bg-parchment text-sepia'}`}>詳解</button>
          <button onClick={() => setView('essay')} className={`px-3 py-1.5 rounded-full transition-all ${view === 'essay' ? 'bg-forest text-cream' : 'hover:bg-parchment text-sepia'}`}>申論</button>
        </nav>
      </div>
    </header>
  );
}

  return (

      <section className="paper rounded-lg p-8 sm:p-12 mb-8 ornament-border">
        <div className="divider-ornament text-xs tracking-[0.3em] uppercase mb-4">welcome</div>
        <p className="font-serif text-lg sm:text-xl leading-relaxed text-ink/90 mb-6">
          這本筆記彙整了 <strong className="text-rust">80 題選擇題</strong> 與 <strong className="text-rust">11 題期末申論</strong>，每題附有詳細解析。所有答案皆基於動物行為學標準教材整理而成。
        </p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
          <Stat label="選擇題" value="80" />
          <Stat label="申論題" value="11" />

          <button onClick={() => setView('study')} className="btn-rust px-6 py-3 rounded-full font-medium tracking-wide">直接看詳解</button>
          <button onClick={() => setView('essay')} className="px-6 py-3 rounded-full font-medium tracking-wide border-2 border-forest text-forest hover:bg-forest hover:text-cream transition-all">期末申論</button>
        </div>
      </section>
      
      <section className="grid sm:grid-cols-3 gap-4">
        <ModeCard
          title="選擇題練習"
          desc="按章節練習，即時看答案解析，自動記錄進度。"
          tag="QUIZ"
          color="forest"
          onClick={() => setView('quiz')}
        />
        <ModeCard
          title="詳解閱覽"
          desc="一次看所有題目和詳細解析，適合考前快速複習。"

          color="rust"
          onClick={() => setView('study')}
        />
        <ModeCard
          title="期末申論題庫"
          desc="11 題期末申論，每題附有完整答題框架與範例答案。"
          tag="ESSAY"
          color="amber"
          onClick={() => setView('essay')}
        />

}

function Stat({ label, value }) {
  return (
    <div className="text-center">
      <div className="font-display text-3xl sm:text-4xl text-forest font-medium">{value}</div>
      <div className="text-xs tracking-widest text-sepia uppercase mt-1">{label}</div>
    </div>
  );
}

function ModeCard({ title, desc, tag, color, onClick }) {
  const colorMap = {
    forest: 'bg-forest text-cream',
    rust: 'bg-rust text-cream',
    amber: 'bg-amber text-ink',
  };
  return (
    <button onClick={onClick} className="paper rounded-lg p-6 text-left hover:scale-[1.02] transition-transform ornament-border group">
      <div className={`tag inline-block mb-3 ${colorMap[color]}`}>{tag}</div>
      <h3 className="font-display text-xl font-medium text-ink mb-2 group-hover:text-rust transition-colors">{title}</h3>
      <p className="text-sm text-sepia leading-relaxed">{desc}</p>
    </button>
  );
}

function QuizMode({ progress, setProgress }) {
  const [chapter, setChapter] = useState("全部");
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExplain, setShowExplain] = useState(false);
  
  const questions = useMemo(() => 
    chapter === "全部" ? MC_QUESTIONS : MC_QUESTIONS.filter(q => q.set === chapter),
    [chapter]
  );
  
  useEffect(() => { setIdx(0); setSelected(null); setShowExplain(false); }, [chapter]);
  
  if (questions.length === 0) return null;
  const q = questions[idx];
  const wasAnswered = progress[q.id];
  
  const choose = (i) => {
    if (selected !== null) return;
    setSelected(i);
    setShowExplain(true);
    const newProgress = { ...progress, [q.id]: { selected: i, correct: i === q.ans } };
    setProgress(newProgress);
    saveProgress(newProgress);
  };
  
  const next = () => {
    if (idx < questions.length - 1) {
      setIdx(idx + 1);
      setSelected(null);
      setShowExplain(false);
    }
  };
  const prev = () => {
    if (idx > 0) {
      setIdx(idx - 1);
      setSelected(null);
      setShowExplain(false);
    }
  };
  
  return (
    <main className="max-w-3xl mx-auto px-4 py-6 sm:py-8">
      <div className="flex flex-wrap gap-2 mb-6">
        {CHAPTERS.map(c => (
          <button key={c} onClick={() => setChapter(c)} className={`px-3 py-1.5 rounded-full text-xs tracking-wider transition-all ${chapter === c ? 'bg-forest text-cream' : 'bg-cream border border-sepia/30 text-sepia hover:bg-parchment'}`}>{c}</button>
        ))}
      </div>
      
      <div className="paper rounded-lg p-6 sm:p-8 ornament-border fade-in" key={q.id}>
        <div className="flex justify-between items-center mb-6">
          <div className="text-xs tracking-[0.2em] uppercase text-sepia">{q.set}</div>
          <div className="text-xs text-sepia">{idx + 1} / {questions.length}</div>
        </div>
        
        <h2 className="font-serif text-lg sm:text-xl leading-relaxed text-ink mb-6">
          <span className="text-rust font-display font-medium mr-2">{q.id}.</span>{q.q}
        </h2>
        
        <div className="space-y-3 mb-6">
          {q.choices.map((c, i) => {
            const letter = String.fromCharCode(65 + i);
            let cls = "choice-btn";
            if (selected !== null) {
              if (i === q.ans) cls += " correct";
              else if (i === selected) cls += " wrong";
            }
            return (
              <button key={i} onClick={() => choose(i)} disabled={selected !== null} className={`${cls} w-full px-4 py-3 rounded-md flex items-start gap-3`}>
                <span className="font-display font-semibold text-rust shrink-0">{letter}.</span>
                <span className="text-ink/90 leading-relaxed">{c}</span>
                {selected !== null && i === q.ans && <span className="ml-auto text-forest">✓</span>}
                {selected !== null && i === selected && i !== q.ans && <span className="ml-auto text-rust">✗</span>}
              </button>
            );
          })}
        </div>
        
        {showExplain && (
          <div className="fade-in border-t border-sepia/20 pt-5 mt-5">
            <div className="divider-ornament text-xs tracking-[0.3em] uppercase mb-3">解析</div>
            <p className="text-ink/85 leading-relaxed whitespace-pre-line" dangerouslySetInnerHTML={{__html: q.explain.replace(/\*\*(.+?)\*\*/g, '<strong class="text-rust">$1</strong>').replace(/\*(.+?)\*/g, '<em class="text-forest not-italic">$1</em>')}} />
          </div>
        )}
        
        <div className="flex justify-between items-center mt-6 pt-6 border-t border-sepia/15">
          <button onClick={prev} disabled={idx === 0} className="px-4 py-2 text-sm text-sepia disabled:opacity-30 hover:text-forest">← 上一題</button>
          <div className="flex gap-1">
            {questions.slice(Math.max(0, idx-3), Math.min(questions.length, idx+4)).map((qq, i, arr) => {
              const realIdx = Math.max(0, idx-3) + i;
              const status = progress[qq.id];
              return (
                <button key={qq.id} onClick={() => { setIdx(realIdx); setSelected(null); setShowExplain(false); }}
                  className={`w-2 h-2 rounded-full transition-all ${realIdx === idx ? 'w-6 bg-forest' : status?.correct ? 'bg-moss' : status ? 'bg-rust/40' : 'bg-sepia/20'}`}/>
              );
            })}
          </div>
          <button onClick={next} disabled={idx === questions.length - 1} className="px-4 py-2 text-sm text-sepia disabled:opacity-30 hover:text-forest">下一題 →</button>
        </div>
      </div>
    </main>
  );
}

function StudyMode() {
  const [chapter, setChapter] = useState("全部");
  const [expanded, setExpanded] = useState(new Set());
  
  const questions = useMemo(() =>
    chapter === "全部" ? MC_QUESTIONS : MC_QUESTIONS.filter(q => q.set === chapter),
    [chapter]
  );
  
  const toggle = (id) => {
    const newExp = new Set(expanded);
    if (newExp.has(id)) newExp.delete(id); else newExp.add(id);
    setExpanded(newExp);
  };
  
  return (
    <main className="max-w-3xl mx-auto px-4 py-6 sm:py-8">
      <div className="flex flex-wrap gap-2 mb-6">
        {CHAPTERS.map(c => (
          <button key={c} onClick={() => setChapter(c)} className={`px-3 py-1.5 rounded-full text-xs tracking-wider transition-all ${chapter === c ? 'bg-forest text-cream' : 'bg-cream border border-sepia/30 text-sepia hover:bg-parchment'}`}>{c}</button>
        ))}
        <button onClick={() => setExpanded(new Set(questions.map(q => q.id)))} className="px-3 py-1.5 rounded-full text-xs tracking-wider border border-rust text-rust hover:bg-rust hover:text-cream transition-all ml-auto">全部展開</button>
        <button onClick={() => setExpanded(new Set())} className="px-3 py-1.5 rounded-full text-xs tracking-wider border border-sepia/40 text-sepia hover:bg-parchment transition-all">全部收合</button>
      </div>
      
      <div className="space-y-3">
        {questions.map(q => (
          <div key={q.id} className="paper rounded-lg p-5 ornament-border">
            <button onClick={() => toggle(q.id)} className="w-full text-left">
              <div className="flex items-start gap-3">
                <span className="font-display font-medium text-rust shrink-0">{q.id}.</span>
                <div className="flex-1">
                  <div className="text-xs tracking-widest text-sepia uppercase mb-1">{q.set}</div>
                  <p className="font-serif text-base text-ink leading-relaxed">{q.q}</p>
                </div>
                <span className={`text-sepia text-xl transition-transform ${expanded.has(q.id) ? 'rotate-180' : ''}`}>⌄</span>
              </div>
            </button>
            
            {expanded.has(q.id) && (
              <div className="fade-in mt-4 pt-4 border-t border-sepia/15">
                <div className="space-y-2 mb-4">
                  {q.choices.map((c, i) => (
                    <div key={i} className={`px-3 py-2 rounded text-sm leading-relaxed flex items-start gap-2 ${i === q.ans ? 'bg-forest/8 border-l-3 border-forest text-forest font-medium' : 'text-ink/70'}`}>
                      <span className="font-display font-semibold shrink-0">{String.fromCharCode(65 + i)}.</span>
                      <span>{c}</span>
                      {i === q.ans && <span className="ml-auto">✓ 正解</span>}
                    </div>
                  ))}
                </div>
                <div className="bg-parchment/60 rounded-md p-4 border-l-4 border-rust">
                  <div className="text-xs tracking-[0.2em] uppercase text-rust mb-2 font-medium">詳解</div>
                  <p className="text-sm text-ink/85 leading-relaxed whitespace-pre-line" dangerouslySetInnerHTML={{__html: q.explain.replace(/\*\*(.+?)\*\*/g, '<strong class="text-rust">$1</strong>').replace(/\*(.+?)\*/g, '<em class="text-forest not-italic">$1</em>')}}/>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </main>
  );
}

function EssayMode() {
  const [selectedId, setSelectedId] = useState(1);
  const essay = ESSAY_QUESTIONS.find(e => e.id === selectedId);
  
  const renderMarkdown = (md) => {
    let html = md
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3 class="font-display text-xl text-forest mt-6 mb-3">$1</h3>')
      .replace(/^## (.+)$/gm, '<h2 class="font-display text-2xl text-rust mt-6 mb-3">$1</h2>')
      .replace(/^# (.+)$/gm, '<h1 class="font-display text-2xl text-forest mt-6 mb-3">$1</h1>')
      .replace(/^> (.+)$/gm, '<blockquote class="border-l-4 border-amber pl-4 py-1 my-3 italic text-forest bg-amber/5">$1</blockquote>')
      .replace(/^---$/gm, '<hr class="my-5 border-sepia/20"/>');
    
    // Tables
    const tableRegex = /((?:\|[^\n]+\|\n)+)/g;
    html = html.replace(tableRegex, (match) => {
      const rows = match.trim().split('\n').filter(r => r.includes('|'));
      if (rows.length < 2) return match;
      const cells = rows.map(r => r.split('|').slice(1, -1).map(c => c.trim()));
      const isSeparator = (row) => row.every(c => /^:?-+:?$/.test(c));
      const header = cells[0];
      const body = cells.slice(1).filter(r => !isSeparator(r));
      return `<table class="my-4 w-full text-sm border-collapse">
        <thead><tr class="bg-forest/10">${header.map(h => `<th class="px-3 py-2 text-left font-display font-medium text-forest border-b-2 border-forest/30">${h}</th>`).join('')}</tr></thead>
        <tbody>${body.map(row => `<tr class="border-b border-sepia/15">${row.map(c => `<td class="px-3 py-2 align-top">${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>`;
    });
    
    // Lists
    html = html.replace(/^- (.+)$/gm, '<li class="ml-5 list-disc">$1</li>');
    html = html.replace(/(<li[^>]*>.*<\/li>\n?)+/g, m => `<ul class="my-2 space-y-1">${m}</ul>`);
    
    // Paragraphs
    html = html.split('\n\n').map(p => {
      if (p.startsWith('<') || p.trim() === '') return p;
      return `<p class="my-3">${p.replace(/\n/g, '<br/>')}</p>`;
    }).join('\n');
    
    return html;
  };
  
  return (
    <main className="max-w-6xl mx-auto px-4 py-6 sm:py-8">
      <div className="grid lg:grid-cols-[260px_1fr] gap-6">
        <aside className="lg:sticky lg:top-24 lg:self-start">
          <div className="paper rounded-lg p-4 ornament-border">
            <div className="text-xs tracking-[0.3em] uppercase text-sepia mb-3 px-2">期末申論</div>
            <div className="space-y-1">
              {ESSAY_QUESTIONS.map(e => (
                <button key={e.id} onClick={() => setSelectedId(e.id)} className={`w-full text-left px-3 py-2 rounded text-sm transition-all ${selectedId === e.id ? 'bg-forest text-cream' : 'hover:bg-parchment text-ink/70'}`}>
                  <span className="font-display font-medium mr-2">{e.id}.</span>
                  <span className="text-xs">{e.qTC.slice(0, 18)}...</span>
                </button>
              ))}
            </div>
          </div>
        </aside>
        
        <div className="paper rounded-lg p-6 sm:p-10 ornament-border fade-in" key={selectedId}>
          <div className="divider-ornament text-xs tracking-[0.3em] uppercase mb-4">Question {essay.id}</div>
          
          <div className="mb-6">
            <p className="font-serif text-base text-sepia italic leading-relaxed mb-3">{essay.q}</p>
            <p className="font-serif text-lg text-ink leading-relaxed">{essay.qTC}</p>
          </div>
          
          <div className="divider-ornament text-xs tracking-[0.3em] uppercase mb-4">參考答案</div>
          
          <article className="essay-content text-ink/85" dangerouslySetInnerHTML={{ __html: renderMarkdown(essay.answer) }}/>
          
          <div className="mt-8 pt-6 border-t border-sepia/20 flex justify-between text-sm">
            <button onClick={() => setSelectedId(Math.max(1, selectedId - 1))} disabled={selectedId === 1} className="text-sepia disabled:opacity-30 hover:text-forest">← 上一題</button>
            <button onClick={() => setSelectedId(Math.min(11, selectedId + 1))} disabled={selectedId === 11} className="text-sepia disabled:opacity-30 hover:text-forest">下一題 →</button>
          </div>
        </div>
      </div>
    </main>
  );
}

function App() {
  const [view, setView] = useState('home');
  const [progress, setProgress] = useState(loadProgress());
  
  return (

}
